<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<style>
    .active{
        font-size: 30px;
        background-color: aqua;
        animation: left 1s linear;
    }

    .active:hover{
        background-color: red;
    }

    .active:hover::after{
        content: "delete";
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: end;
    }

    @keyframes left {

        0% {
            transform: translateX(-100px);
        }
        100%{
            transform: translateX(0);
        }
        
    }
</style>
