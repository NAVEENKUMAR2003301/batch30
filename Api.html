  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }



     body{
        width: 100vw;
        height: auto;

        display: flex;
        justify-content: center;
        align-content: center;
        flex-wrap: wrap;
     }

     .api{
        background-color: aqua;
        width: 100%;
        height: 100%;

        display: flex;
        justify-content: center;
        align-content: center;
        flex-wrap: wrap;
        gap: 3px;

     }

     .api > div {
        width: 300px;
        height: 350px;

        border: 5px solid black;
        background-color: bisque;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        padding: 10px;

     }

     .api > div > h1 {
         font-size: 20px;
     }

     .api > div > img {
        width: 200px;
        height: 200px;
     }


</style>

    <div class="api"></div>
